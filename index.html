<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veklam{ — Fashion Platform</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --cream: #F7F4EF;
  --warm-white: #EDEAD3;
  --caramel: #C8956C;
  --dark-brown: #8B5E3C;
  --charcoal: #1A1A1A;
  --soft-gray: #9A8F82;
  --light-border: #DDD8D0;
  --error-red: #E05252;
  --success-green: #52A869;
  --customer-color: #7B9DC5;
  --designer-color: #9B7BC5;
  --printing-color: #7BC58B;
  --super-color: #C8956C;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--charcoal); min-height: 100vh; }
.playfair { font-family: 'Playfair Display', serif; }
.text-soft { color: var(--soft-gray); }
.text-caramel { color: var(--caramel); }
.bg-cream { background: var(--cream); }
.bg-warm { background: #EDEAD3; }
.border-light-custom { border-color: var(--light-border) !important; }

/* ── Pages ── */
.page { display: none; min-height: 100vh; }
.page.active { display: block; }

/* ── Login ── */
#page-login { background: var(--cream); }
.login-wrap { max-width: 440px; margin: 0 auto; padding: 60px 28px 40px; }
.logo-text { font-size: 52px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
.logo-brace { color: var(--caramel); }
.login-subtitle { font-size: 14px; color: var(--soft-gray); margin-top: 8px; }
.form-control-veklam {
  background: #EDEAD3; border: 1.5px solid var(--light-border); border-radius: 14px;
  padding: 12px 16px 12px 44px; font-size: 14px; font-family: 'DM Sans', sans-serif;
  color: var(--charcoal); width: 100%; transition: border-color .2s;
}
.form-control-veklam:focus { outline: none; border-color: var(--caramel); box-shadow: 0 0 0 3px rgba(200,149,108,.12); }
.input-wrap { position: relative; }
.input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--soft-gray); font-size: 16px; }
.input-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--soft-gray); cursor: pointer; font-size: 16px; border: none; background: none; }
.btn-veklam-dark {
  background: var(--charcoal); color: #fff; border: none; border-radius: 14px;
  padding: 14px 24px; font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif;
  width: 100%; cursor: pointer; transition: opacity .2s;
}
.btn-veklam-dark:hover { opacity: .85; }
.btn-veklam-caramel {
  background: var(--caramel); color: #fff; border: none; border-radius: 14px;
  padding: 14px 24px; font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: opacity .2s;
}
.btn-veklam-caramel:hover { opacity: .85; }
.btn-outline-veklam {
  background: #fff; border: 1.5px solid var(--light-border); border-radius: 14px;
  padding: 12px 18px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all .2s; color: var(--charcoal); display: flex; align-items: center; gap: 8px; justify-content: center;
}
.btn-outline-veklam:hover { border-color: var(--charcoal); }
.divider-or { display: flex; align-items: center; gap: 16px; color: var(--soft-gray); font-size: 13px; }
.divider-or::before, .divider-or::after { content: ''; flex: 1; height: 1.5px; background: var(--light-border); }
.role-card {
  background: #fff; border: 1.5px solid var(--light-border); border-radius: 20px;
  padding: 18px; cursor: pointer; transition: all .25s; display: flex; align-items: center; gap: 16px;
  box-shadow: 0 4px 12px rgba(0,0,0,.04);
}
.role-card:hover { border-color: var(--caramel); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.08); }
.role-icon-wrap { width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.role-arrow { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; }
.fade-in { animation: fadeIn .5s ease forwards; }
.slide-up { animation: slideUp .5s ease forwards; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.role-card:nth-child(1) { animation: slideUp .4s .05s both; }
.role-card:nth-child(2) { animation: slideUp .4s .13s both; }
.role-card:nth-child(3) { animation: slideUp .4s .21s both; }
.role-card:nth-child(4) { animation: slideUp .4s .29s both; }

/* ── App Layout ── */
.app-layout { display: flex; flex-direction: column; min-height: 100vh; }
.app-navbar {
  background: #fff; border-bottom: 1px solid var(--light-border);
  padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,.05);
}
.nav-logo { font-size: 26px; font-weight: 900; font-family: 'Playfair Display', serif; letter-spacing: -1px; }
.nav-tabs-custom { display: flex; gap: 4px; margin-left: auto; }
.nav-tab-btn {
  padding: 7px 18px; border-radius: 12px; border: none; background: transparent;
  font-size: 13px; font-weight: 600; color: var(--soft-gray); cursor: pointer; transition: all .2s;
  font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 6px;
}
.nav-tab-btn:hover { background: var(--cream); color: var(--charcoal); }
.nav-tab-btn.active { background: var(--charcoal); color: #fff; }
.nav-tab-btn.active-customer { background: var(--customer-color); color: #fff; }
.nav-tab-btn.active-designer { background: var(--designer-color); color: #fff; }
.nav-tab-btn.active-printing { background: var(--printing-color); color: #fff; }
.nav-tab-btn.active-super { background: var(--super-color); color: #fff; }
.app-content { flex: 1; padding: 28px 24px; max-width: 1200px; margin: 0 auto; width: 100%; }
.nav-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--caramel); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; cursor: pointer; flex-shrink: 0; }

/* ── Stat Cards ── */
.stat-card {
  background: #fff; border-radius: 20px; padding: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,.05); transition: transform .2s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-icon-wrap { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; font-size: 18px; }
.stat-value { font-size: 28px; font-weight: 900; font-family: 'Playfair Display', serif; line-height: 1; }
.stat-label { font-size: 12px; color: var(--soft-gray); font-weight: 500; margin-top: 4px; }
.stat-sub { font-size: 10px; color: var(--soft-gray); margin-top: 2px; }

/* ── Product Cards ── */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.product-card {
  background: #fff; border-radius: 20px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.06); cursor: pointer; transition: all .25s;
}
.product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,.1); }
.product-img { position: relative; aspect-ratio: 3/3.5; overflow: hidden; }
.product-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.product-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 48px; }
.wishlist-btn {
  position: absolute; top: 10px; right: 10px; width: 32px; height: 32px;
  background: rgba(255,255,255,.92); border-radius: 50%; border: none;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  font-size: 15px; transition: transform .2s;
}
.wishlist-btn:hover { transform: scale(1.15); }
.product-badges { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 4px; }
.badge-new { background: var(--caramel); color: #fff; font-size: 8px; font-weight: 800; padding: 3px 8px; border-radius: 20px; letter-spacing: .5px; }
.badge-trend { background: #E05252; color: #fff; font-size: 8px; font-weight: 800; padding: 3px 8px; border-radius: 20px; }
.badge-3d { position: absolute; bottom: 10px; left: 10px; background: rgba(26,26,26,.8); color: #fff; font-size: 9px; font-weight: 700; padding: 4px 8px; border-radius: 8px; display: flex; align-items: center; gap: 4px; }
.product-img-grad { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(to top, rgba(0,0,0,.15), transparent); pointer-events: none; }
.product-info { padding: 12px; }
.product-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-brand { font-size: 10px; color: var(--soft-gray); }
.product-price { font-size: 15px; font-weight: 800; font-family: 'Playfair Display', serif; }
.add-btn { width: 28px; height: 28px; background: var(--charcoal); border: none; border-radius: 8px; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity .2s; }
.add-btn:hover { opacity: .8; }

/* ── Category Chips ── */
.chip-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.chip-bar::-webkit-scrollbar { display: none; }
.chip {
  padding: 7px 16px; border-radius: 30px; border: 1.5px solid var(--light-border);
  background: #EDEAD3; font-size: 12px; font-weight: 600; color: var(--soft-gray);
  cursor: pointer; white-space: nowrap; transition: all .2s;
}
.chip.active { background: var(--charcoal); border-color: var(--charcoal); color: #fff; }
.chip:hover:not(.active) { border-color: var(--charcoal); color: var(--charcoal); }

/* ── Ad Banners ── */
.ad-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 4px 0 8px; scrollbar-width: none; }
.ad-scroll::-webkit-scrollbar { display: none; }
.ad-card { width: 200px; min-width: 200px; height: 105px; border-radius: 18px; position: relative; overflow: hidden; cursor: pointer; flex-shrink: 0; }
.ad-card-inner { position: absolute; inset: 0; padding: 14px; }
.ad-bubble { position: absolute; top: -20px; right: -20px; width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,.07); }
.ad-tag { font-size: 8px; color: rgba(255,255,255,.6); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.ad-title { font-size: 14px; color: #fff; font-weight: 800; font-family: 'Playfair Display', serif; line-height: 1.3; margin-top: 2px; }
.ad-cta { position: absolute; bottom: 12px; right: 12px; background: rgba(255,255,255,.2); color: #fff; font-size: 9px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
.ad-emoji { position: absolute; top: 14px; right: 14px; font-size: 28px; }
.sponsored-label { font-size: 10px; color: var(--soft-gray); font-weight: 700; letter-spacing: 1.2px; }

/* ── Product Modal ── */
.modal-backdrop-custom { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; display: none; align-items: flex-end; justify-content: center; }
.modal-backdrop-custom.open { display: flex; }
.modal-sheet { background: var(--cream); border-radius: 24px 24px 0 0; max-height: 92vh; overflow-y: auto; width: 100%; max-width: 640px; padding: 0 0 32px; animation: sheetUp .3s ease; }
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-img-wrap { position: relative; height: 360px; overflow: hidden; background: #EDEAD3; }
.modal-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.modal-top-btns { position: absolute; top: 16px; left: 16px; right: 16px; display: flex; gap: 8px; }
.modal-top-btn { width: 40px; height: 40px; background: rgba(255,255,255,.9); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.view-toggle { display: flex; background: #fff; border-radius: 14px; border: 1.5px solid var(--light-border); overflow: hidden; margin: 0 16px 16px; }
.view-toggle-btn { flex: 1; padding: 8px; font-size: 12px; font-weight: 600; border: none; background: transparent; cursor: pointer; color: var(--soft-gray); transition: all .2s; }
.view-toggle-btn.active { background: var(--charcoal); color: #fff; border-radius: 12px; margin: 3px; }
.size-btn { width: 52px; height: 44px; border-radius: 12px; border: 1.5px solid var(--light-border); background: #EDEAD3; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; }
.size-btn.active { background: var(--charcoal); border-color: var(--charcoal); color: #fff; }
.color-dot { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: all .2s; display: flex; align-items: center; justify-content: center; }
.color-dot.active { border-color: var(--charcoal); }
.qty-btn { width: 36px; height: 36px; border-radius: 10px; border: 1.5px solid var(--light-border); background: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.modal-footer { background: #fff; border-top: 1px solid var(--light-border); padding: 16px; display: flex; gap: 12px; position: sticky; bottom: 0; }

/* ── Cart Sidebar ── */
.cart-sidebar { position: fixed; right: 0; top: 0; bottom: 0; width: 400px; max-width: 100vw; background: #fff; z-index: 200; transform: translateX(110%); transition: transform .3s ease; box-shadow: -8px 0 32px rgba(0,0,0,.1); display: flex; flex-direction: column; }
.cart-sidebar.open { transform: translateX(0); }
.cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 199; display: none; }
.cart-overlay.open { display: block; }
.cart-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--light-border); display: flex; align-items: center; gap: 12px; }
.cart-body { flex: 1; overflow-y: auto; padding: 16px; }
.cart-footer { padding: 16px; border-top: 1px solid var(--light-border); background: #fff; }
.cart-item { display: flex; gap: 12px; background: var(--cream); border-radius: 16px; padding: 12px; margin-bottom: 10px; }
.cart-item-img { width: 68px; height: 68px; border-radius: 10px; object-fit: cover; background: #EDEAD3; flex-shrink: 0; overflow: hidden; }
.cart-empty { text-align: center; padding: 60px 20px; }

/* ── Wishlist / Profile ── */
.section-title { font-size: 24px; font-weight: 800; font-family: 'Playfair Display', serif; }
.card-veklam { background: #fff; border-radius: 18px; padding: 16px; box-shadow: 0 4px 12px rgba(0,0,0,.05); }
.list-item-veklam { background: #fff; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all .2s; }
.list-item-veklam:hover { background: var(--cream); }
.profile-avatar { width: 88px; height: 88px; border-radius: 50%; background: var(--caramel); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 700; margin: 0 auto 12px; }

/* ── Role Badge ── */
.role-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; gap: 5px; }
.order-chip { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }

/* ── Designer / Upload ── */
.upload-zone { border: 2px dashed var(--light-border); border-radius: 20px; padding: 48px 24px; text-align: center; background: #EDEAD3; cursor: pointer; transition: all .2s; }
.upload-zone:hover { border-color: var(--caramel); background: #EDE6DC; }
.tag-chip { padding: 7px 14px; border-radius: 30px; border: 1.5px solid var(--light-border); background: #EDEAD3; font-size: 12px; font-weight: 600; color: var(--soft-gray); cursor: pointer; transition: all .2s; display: inline-block; margin: 4px; }
.tag-chip.active { background: var(--designer-color); border-color: var(--designer-color); color: #fff; }
.design-tile { background: #fff; border-radius: 18px; padding: 14px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,.04); margin-bottom: 10px; }
.design-icon { width: 52px; height: 52px; border-radius: 12px; background: rgba(155,123,197,.1); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }

/* ── Order Tiles ── */
.order-tile { background: #fff; border-radius: 18px; padding: 16px; box-shadow: 0 4px 10px rgba(0,0,0,.04); margin-bottom: 10px; }
.order-row { display: flex; align-items: center; gap: 12px; }

/* ── Charts ── */
.chart-card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 4px 16px rgba(0,0,0,.05); }

/* ── Search bar ── */
.search-bar { display: flex; align-items: center; gap: 12px; background: #EDEAD3; border: 1.5px solid var(--light-border); border-radius: 16px; padding: 10px 14px; }
.search-bar input { border: none; background: transparent; flex: 1; font-size: 14px; color: var(--charcoal); font-family: 'DM Sans', sans-serif; outline: none; }
.search-bar input::placeholder { color: var(--soft-gray); }
.filter-btn { width: 34px; height: 34px; background: var(--charcoal); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; flex-shrink: 0; }

/* ── Toasts ── */
.toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
.toast-veklam { background: var(--charcoal); color: #fff; padding: 12px 24px; border-radius: 14px; font-size: 13px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,.2); animation: toastIn .3s ease; min-width: 200px; text-align: center; }
.toast-veklam.success { background: var(--success-green); }
@keyframes toastIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

/* ── User Table ── */
.user-tile { background: #fff; border-radius: 18px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,.04); margin-bottom: 10px; }
.user-avatar-sm { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; }

/* ── Product Mgmt ── */
.product-row { background: #fff; border-radius: 18px; padding: 14px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,.04); margin-bottom: 10px; }
.product-thumb { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: #EDEAD3; overflow: hidden; flex-shrink: 0; }

/* ── Dots ── */
.img-dots { display: flex; gap: 6px; justify-content: center; padding: 12px 0; }
.img-dot { width: 6px; height: 6px; border-radius: 3px; background: var(--light-border); cursor: pointer; transition: all .2s; }
.img-dot.active { width: 20px; background: var(--charcoal); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .app-navbar { padding: 0 16px; height: 56px; }
  .nav-tabs-custom { gap: 2px; }
  .nav-tab-btn { padding: 6px 12px; font-size: 12px; }
  .app-content { padding: 20px 16px; }
  .cart-sidebar { width: 100vw; }
  .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .login-wrap { padding: 40px 20px; }
  .logo-text { font-size: 40px; }
}
@media (max-width: 480px) {
  .nav-tab-btn span { display: none; }
  .nav-tab-btn { padding: 8px 10px; }
}

/* ── Misc ── */
.section-gap { height: 24px; }
.fw-800 { font-weight: 800; }
.fw-900 { font-weig
